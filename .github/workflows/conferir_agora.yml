name: Conferir Resultados Agora

on:
  workflow_dispatch: 

jobs:
  check-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install pillow google-generativeai

      - name: 🔍 Rodar Visão Gemini (OCR)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python conferir_resultados.py

      - name: 💾 Salvar JSON Atualizado (Sem erro se vazio)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add bilhetes_salvos.json
          # O "|| exit 0" impede o erro se não houver mudanças no JSON
          git commit -m "✅ Resultados conferidos" || exit 0
          git push

      - name: 🗑️ Limpar Prints Processados
        if: always() # Garante que os prints sumam mesmo se houver erro acima
        run: |
          rm -f prints/*.jpg prints/*.jpeg prints/*.png
          touch prints/.gitkeep
          git add prints/.gitkeep
          git commit -m "🗑️ Limpando pasta de prints" || exit 0
          git push
          
