name: Execucao Diario Bot Apostas

on:
  push:
    paths:
      - 'main.py'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: 1. Conferir Resultados (Prints de Ontem)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Roda primeiro para limpar o que estava "Pendente" no JSON
        run: python conferir_resultados.py

      - name: 2. Executar bot Selenium (Bingos de Hoje)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py

      - name: 3. Limpar pasta de prints
        # Remove os prints processados para a pasta ficar limpa para amanhã
        run: |
          rm -f prints/*.jpg prints/*.jpeg prints/*.png
          # Mantém a pasta existindo para o git não removê-la
          touch prints/.gitkeep

      - name: 4. Salvar alteracoes (JSON de Bilhetes)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add bilhetes_salvos.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Histórico: Resultados conferidos e novos bingos salvos" && git push)
          
