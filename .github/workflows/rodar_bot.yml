name: Apostas Diária

on:
  schedule:
    - cron: '0 11,17 * * *'
  workflow_dispatch: # Permite rodar manualmente no botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Robô
        env:
          ZENROWS_KEY: ${{ secrets.ZENROWS_KEY }}
          # TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }} # Descomente quando usar
          # CHAT_ID: ${{ secrets.CHAT_ID }}               # Descomente quando usar
        run: python main.py
        
