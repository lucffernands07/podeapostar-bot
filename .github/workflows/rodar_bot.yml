name: Apostas Diária

on:
  schedule:
    # Roda às 08:00 e 14:00 (Horário de Brasília)
    - cron: '0 11,17 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          # Aqui instalamos o que o cloudscraper e o BeautifulSoup precisam
          pip install cloudscraper beautifulsoup4 lxml requests

      - name: Executar Robô
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
        
