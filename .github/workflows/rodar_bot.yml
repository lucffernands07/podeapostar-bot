name: Robô de Bilhetes - SofaScore Elite

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          # Comando para instalar tudo que está no seu requirements.txt
          pip install -r requirements.txt

      - name: Executar Rastreador de Elite
        env:
          # Apenas as credenciais do seu Telegram
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "🚀 Iniciando Mineração via TLS-Client (Técnica do Fórum)..."
          python main.py
