name: Automação Apostas (Main & CashOut)

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'cashout.py'
  schedule:
    # 11:00 UTC = 08:00 Brasília
    - cron: '0 11 * * *'
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          fetch-depth: 2 

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install requests selenium webdriver-manager pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verificar Alterações e Rodar Scripts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: |
          # 1. Se for agendado (08h) ou manual, roda os dois
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🚀 Rodando execução completa diária (Main e Cashout)..."
            python main.py
            python cashout.py
          
          # 2. Se for um Push, verifica qual arquivo específico foi alterado
          else
            MODIFIED_FILES=$(git diff --name-only HEAD^ HEAD)
            
            if [[ $MODIFIED_FILES == *"main.py"* ]]; then
              echo "✅ Alteração no Main detectada. Rodando Main..."
              python main.py
            fi
            
            if [[ $MODIFIED_FILES == *"cashout.py"* ]]; then
              echo "✅ Alteração no Cashout detectada. Rodando Cashout..."
              python cashout.py
            fi
          fi
