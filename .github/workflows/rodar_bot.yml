name: Robô de Bilhetes - API BSD

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
  schedule:
    # 11:15 UTC = 08:15 Brasília
    - cron: '15 11 * * *'
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Removi a instalação do Chrome para o bot rodar em segundos! 🚀

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar Rastreador de Bilhetes
        env:
          # --- AS CHAVES ABAIXO DEVEM ESTAR NO SETTINGS > SECRETS DO GITHUB ---
          BSD_TOKEN: ${{ secrets.BSD_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # Mantive as antigas caso você ainda use o ZenRows em outra parte do código
          ZENROWS_KEY: ${{ secrets.ZENROWS_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: |
          echo "🚀 Iniciando Mineração via API BSD..."
          python main.py
