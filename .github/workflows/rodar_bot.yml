name: Executar PodeApostar Bot
on:
  workflow_dispatch: # Permite rodar manualmente clicando no botão
  schedule:
    # O horário UTC é 3h a mais que o de Brasília.
    # '0 13 * * 6,0' roda Sábado e Domingo às 10h da manhã (Horário de Brasília)
    - cron: '0 13 * * 6,0'

jobs:
  job_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Bibliotecas
        run: pip install -r requirements.txt

      - name: Rodar Analisador de Gols
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
        
