name: Executar Diagnostico Apostas

on:
  push:
    branches: [ main ]
  schedule:
    # 08:00 Brasília é 11:00 UTC. 
    # O formato é: Minuto Hora Dia Mês Dia_da_Semana
    - cron: '0 11 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          # Tenta instalar pelo requirements, mas garante o pytz e as dependências do Selenium
          pip install requests selenium webdriver-manager pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar Teste de Diagnostico
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          X_RAPIDAPI_KEY: ${{ secrets.X_RAPIDAPI_KEY }}
        run: python main.py
