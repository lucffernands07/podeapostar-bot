name: Executar PodeApostar Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  job_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ETAPA ESSENCIAL: Instala as bibliotecas de sistema para o Chromium rodar no Linux
      - name: Instalar Dependências do Navegador
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxss1 libasound2 libpangocairo-1.0-0 libpango-1.0-0

      - name: Instalar Bibliotecas Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Analisador
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
        
