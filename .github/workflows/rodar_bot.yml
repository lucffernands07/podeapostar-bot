name: Execucao Diario Bot Apostas

on:
  push:
    paths:
      - 'main.py'
  schedule:
    # 00:05 Horário de Brasília = 03:05 UTC
    - cron: '05 03 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo celular se precisar

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Executar bot Selenium
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
        
