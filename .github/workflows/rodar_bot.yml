name: Executar PodeApostar Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  job_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- ETAPA FALTANTE QUE CAUSA O ERRO DE VERSÃO ---
      - name: Instalar Google Chrome Estável
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable=145.0.7632.116-1 || sudo apt-get install -y google-chrome-stable

      - name: Instalar Bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Analisador
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
