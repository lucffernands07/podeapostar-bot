name: Execucao Diario Bot Apostas

on:
  push:
    paths:
      - 'main.py'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite que o robô salve o JSON no repositório

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pillow google-generativeai # Garante bibliotecas da IA e Imagem

      - name: 1. Conferir Resultados (Prints de Ontem)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Processa os prints antes para atualizar o ranking
        run: python conferir_resultados.py

      - name: 2. Executar bot Selenium (Bingos de Hoje)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py

      - name: 3. Limpar pasta de prints
        # Remove os arquivos físicos para a pasta não crescer infinitamente
        run: |
          rm -f prints/*.jpg prints/*.jpeg prints/*.png
          touch prints/.gitkeep

      - name: 4. Salvar alteracoes (JSON e Limpeza)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Adiciona o JSON atualizado
          git add bilhetes_salvos.json
          
          # Registra a remoção dos prints que foram apagados no passo anterior
          git add -u prints/
          
          # Tenta o commit. O "|| exit 0" garante luz VERDE mesmo se não houver jogos hoje.
          git commit -m "📊 Atualização: $(date +'%d/%m/%Y %H:%M')" || exit 0
          
          git push
          
