name: Execucao Diario Bot Apostas

on:
  push:
    paths:
      - 'main.py'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: 1. Executar bot Selenium (Bilhetes de Hoje)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py

      - name: 2. Limpar pasta de prints
        # Como o main não confere mais, apenas garantimos que a pasta está limpa
        run: |
          rm -f prints/*.jpg prints/*.jpeg prints/*.png
          touch prints/.gitkeep

      - name: 3. Salvar Limpeza no Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Registra apenas a limpeza dos arquivos para o repositório ficar organizado
          git add -u prints/ || true
          
          # Se não houver nada para commitar, o exit 0 garante a luz verde
          git commit -m "🧹 Limpeza de arquivos temporários: $(date +'%d/%m/%Y')" || exit 0
          
          git push
          
