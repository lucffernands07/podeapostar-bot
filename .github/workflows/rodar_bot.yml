name: Robô de Bilhetes - Witchgoals PRO

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
  schedule:
    # 11:15 UTC = 08:15 Brasília
    - cron: '15 11 * * *'
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          # Garante que o 'requests' esteja instalado para as chamadas de API
          pip install requests

      - name: Executar Rastreador de Bilhetes
        env:
          # --- NOVAS CHAVES PARA WITCHGOALS ---
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
          WITCH_API_HOST: ${{ secrets.WITCH_API_HOST }}
          
          # --- NOTIFICAÇÃO ---
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          
          # Mantive as antigas caso precise de fallback
          BSD_TOKEN: ${{ secrets.BSD_TOKEN }}
        run: |
          echo "🚀 Iniciando Mineração de Elite via Witchgoals..."
          python main.py
