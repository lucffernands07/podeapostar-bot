name: Robô de Bilhetes - Flashscore Miner

on:
  push:
    branches: [ main ]
  schedule:
    # 08:00 Brasília = 11:00 UTC
    # Minuto 0, Hora 11, Qualquer dia, Qualquer mês, Qualquer dia da semana
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo botão 'Run workflow'

jobs:
  mineracao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          # Requisitos mínimos para o Flashscore
          pip install requests python-dotenv

      - name: Executar Mineração Flashscore
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "🚀 Iniciando Mineração via Feed Bruteforce (Flashscore)..."
          python main.py
