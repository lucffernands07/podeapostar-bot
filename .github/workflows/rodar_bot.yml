name: Robô de Bilhetes - SofaScore Elite

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          # Aqui ele vai ler seu arquivo requirements.txt com tls-client e typing_extensions
          pip install -r requirements.txt

      - name: Executar Rastreador
        env:
          # Mantive as chaves essenciais para o bot funcionar
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "⏳ Aguardando estabilização da rede..."
          sleep 5
          echo "🚀 Iniciando Mineração via TLS-Client (Técnica do Fórum)..."
          python main.py
