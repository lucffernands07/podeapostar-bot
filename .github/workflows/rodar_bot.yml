name: Robô de Bilhetes - SofaScore Elite

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
  schedule:
    # 11:15 UTC = 08:15 Brasília
    - cron: '15 11 * * *'
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          # Adicionamos typing_extensions explicitamente para evitar o erro de import
          pip install requests tls_client python-dotenv typing_extensions

      - name: Executar Rastreador de Bilhetes
        env:
          # --- CREDENCIAIS DO TELEGRAM ---
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          
          # Caso ainda use alguma chave de API externa
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          echo "🚀 Iniciando Mineração de Elite via SofaScore..."
          python main.py
