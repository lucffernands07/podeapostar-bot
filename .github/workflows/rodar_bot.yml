name: Robô de Bilhetes - SofaScore Elite

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  execucao:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Executar Rastreador
        env:
          SCRAPERANT_API_KEY: ${{ secrets.SCRAPERANT_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # Adicionei um pequeno "sleep" e uma tentativa extra caso o DNS falhe
        run: |
          echo "⏳ Aguardando estabilização da rede..."
          sleep 5
          echo "🚀 Iniciando Mineração via ScraperAnt..."
          python main.py || (sleep 10 && python main.py)
