name: Executar PodeApostar Bot
on:
  workflow_dispatch: # Permite que você rode manualmente quando quiser
  schedule:
    # Roda TODOS OS DIAS às 13:00 UTC (10:00 Horário de Brasília)
    # O '*' no lugar do dia da semana significa 'todos os dias'
    - cron: '0 13 * * *'

jobs:
  job_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Bibliotecas
        run: pip install -r requirements.txt

      - name: Rodar Analisador
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
        
