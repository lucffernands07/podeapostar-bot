name: Teste gols

on:
  workflow_dispatch: # Permite que você clique em "Run Workflow" no GitHub

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests
          # Adicione outras dependências se seus módulos (ligas, odds) pedirem
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar Teste de Gols
        env:
          # Mesmo que o teste não envie telegram, o import do main pode pedir as variáveis
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python testes/teste_gols.py
