name: Teste Isolado de Links Google-Betano

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'testes/teste_links.py'
      - '.github/workflows/teste_links.yml'

jobs:
  run-test-google:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar Teste de Link
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python testes/teste_links.py

      - name: Exibir Log do HTML
        if: always()
        run: |
          if [ -f log_html_google.txt ]; then
            cat log_html_google.txt
          else
            echo "Arquivo de log não encontrado."
          fi
          
