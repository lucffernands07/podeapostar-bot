name: Sistema de Ranking Automático

on:
  push:
    paths:
      - 'prints/**'  # Só roda quando você upar prints novos

jobs:
  processar-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para salvar o JSON no repositório

    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: |
          pip install google-generativeai

      - name: Rodar Script de Ranking
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_ranking.py

      - name: Salvar Alterações no GitHub
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "RankingBot"
          git add ranking_db.json
          git commit -m "🏆 Ranking atualizado [skip ci]" || echo "Sem mudanças"
          git push
          
