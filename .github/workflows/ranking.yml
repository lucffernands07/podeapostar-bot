name: Sistema de Ranking Automático

on:
  push:
    paths:
      - 'prints/**'
  workflow_dispatch:

jobs:
  processar-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Instalar Tesseract OCR no Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          sudo apt-get install -y tesseract-ocr-por # Instala suporte ao Português

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          pip install pytesseract pillow
          # Se você ainda tiver o requirements.txt, pode manter a linha abaixo
          # pip install -r requirements.txt

      - name: Rodar Script de Ranking
        run: python main_ranking.py

      - name: Salvar Alterações no GitHub
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "RankingBot"
          git add ranking_db.json
          git commit -m "🏆 Ranking atualizado [skip ci]" || echo "Sem mudanças"
          git push origin main
          
