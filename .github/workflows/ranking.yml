name: Ranking de Green x Red

on:
  push:
    paths:
      - 'prints/**'
  workflow_dispatch:

jobs:
  processar-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Tesseract OCR no Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          sudo apt-get install -y tesseract-ocr-por

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          pip install pytesseract pillow

      - name: Rodar Script de Ranking
        run: python main_ranking.py

      - name: Salvar Alterações no GitHub
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "RankingBot"
          # O 'git add .' é essencial para registar que as fotos foram renomeadas para _CONCLUIDO
          git add .
          # O '[skip ci]' impede que o commit do próprio bot dispare uma nova execução
          git commit -m "🏆 Processamento: Imagens concluídas e Ranking atualizado [skip ci]" || echo "Sem mudanças para salvar"
          git push origin main

      - name: Upload OCR Debug Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocr-debug-logs
          path: ocr_debug.log
          
